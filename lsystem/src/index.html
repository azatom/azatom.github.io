<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>L-System Fractals</title>
  <script type="module" src="editor.js"></script>
  <link rel="stylesheet" href="editor.css">
</head>

<body>
  <div id="left">
    <div class="buttons">
      <button id="buttonhelp" title="Help">?</button>
      <button id="buttonsubmit" title="Update (Ctrl+Enter)">
        <object class="checked0" tabindex="-1" type="image/svg+xml" data="lsystem.svg#S=+F++++F++++F,_a=30,_l=4,_cc=%23000f,_cb=%230000,_z=3">Update</object>
        <object class="checked1" tabindex="-1" type="image/svg+xml" data="lsystem.svg#S=F+F+F+F,_a=90,_l=4,_cc=%23000f,_cb=%230000,_z=3">stop</object>
      </button>
      <button id="buttonreset">reset</button>
      <button id="buttontpbg" title="transparent">opaq</button>
      <button id="buttondot" title="Show endpoints only">
        <object class="checked0" tabindex="-1" type="image/svg+xml" data="lsystem.svg#S=++++++F++++F,_a=20,_cc=%23000f,_cb=%230000,_l=8,_z=6">line</object>
        <object class="checked1" tabindex="-1" type="image/svg+xml" data="lsystem.svg#S=++++++F++++F,_a=20,_cc=%230000,_cb=%230000,_l=8,_z=6,_k=2">dot</object>
      </button>
      <button id="buttonalleg">all eg.</button>
      <button id="buttonnexteg" class="altclick" title="Shift: prev. example">
        <div class="a">&nbsp;<br>next e.g.</div>
        <div class="b">prev e.g.<br>&nbsp;</div>
      </button>
      <button id="buttonnpp" class="altclick" title="Shift: increase. CAREFUL!">
        <div class="a">&nbsp;<br>n--</div>
        <div class="b">n++<br>&nbsp;</div>
      </button>
      <button id="buttondefs" class="altclick" title="Shift: put defaults; put viewbox Into textarea">
        <div class="a">&nbsp;<br>viewBox</div>
        <div class="b">defs<br>&nbsp;</div>
      </button>
      <button id="buttoncursive" class="altclick" title="Shift: alternative; experiment, adds turbulence into svg or whole page">
        <div class="a">&nbsp;<br>_hand</div>
        <div class="b">shake<br>&nbsp;</div>
      </button>
      <button id="buttonminilog" class="dropdown" data-checked>log</button>
      <button id="buttonexport" class="dropdown">export</button>
      <button id="buttonjs" class="export hidden" title="Small, url .svg">
        <div class="a">url</div>
        <object class="b" tabindex="-1" type="image/svg+xml" data="lsystem.svg#S=++F++FF++FF++F++f---FF[+++F]---F,_a=45,_cc=%23000f,_cb=%230000,_l=6,_z=4">url</object>
      </button>
      <button id="buttonsvg" class="export hidden" title="Download big, generated .svg">
        <div class="a">SVG</div>
        <object class="b" tabindex="-1" type="image/svg+xml" data="lsystem.svg#S=[A]!++++A,A=F++FF--F+++***F,_n=2,_m=1.4,_a=45,_cc=%23000f,_cb=%230000,_l=3,_z=2">svg</object>
      </button>
      <button id="buttonpng" class="export hidden" title="Download as PNG">
        <div class="a">png</div>
        <object class="b" tabindex="-1" type="image/svg+xml" data="lsystem.svg#S=[A]!++++A,A=F++FF--F+++***F,_n=2,_m=1.4,_a=45,_cc=%23000f,_cb=%230000,_l=3,_z=2">png</object>
      </button>
      <button id="buttonjson" class="export hidden">copy<br>json</button>
      <button id="buttonline" class="export hidden">copy<br>1-line</button>
      <button id="buttonlines" class="export hidden">copy<br>lineS</button>
      <button tabindex="0" id="buttonlog" class="hidden"></button>
    </div>
    <div id="textarea" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
    <button id="textareaClose" class="close" style="display:none" title="Close keyboard" tabindex="-1">✕</button>
  </div>
  <button id="divider" tabindex="-1"></button>
  <div id="right">
    <div id="message" class="hidden"></div>
    <div id="smallsvgs" class="hidden"></div>
    <div id="bigsvg" class="hidden"></div>
    <!--iframe id="readme" class="hidden" src="../README.md"></iframe-->
    <object id="readme" class="hidden" data="../README.md" type="text/plain"></object>
  </div>
</body>

</html>
