<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        a{display:block;}
        span{float: left;}
        object{width:200px;height:200px;}
    </style>
    <script src="lsystem-data.js"></script>
</head>
<body>
<script>
    const svg = "lsystem.svg";
    examples.forEach(example => {
        let url = svg + '?' + example;
        let title = example.split('&').find(a => a.startsWith('_='));
        title = title ? title.substring(2) : "[default]";
        
        let span = document.createElement('span');
        let a = document.createElement('a');
        let object = document.createElement('object');
        
        a.href = url;
        a.textContent = title;
        object.data = url;
        object.type = "image/svg+xml";
        object.textContent = "error";
        
        span.appendChild(a);
        span.appendChild(object);
        document.body.appendChild(span);
    });
</script>
</body>
</html>
