<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notapad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
        }

        .header {
            height: 2.4rem;
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            padding: 0;
            z-index: 8;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            box-shadow: 0 0 0 transparent;
            transition: box-shadow 0.3s;
        }

        .header.scrolled {
            box-shadow: 0 2px 5px rgba(0, 100, 100, 0.5);
        }

        button {
            flex: 1 1 18%;
            margin: .2rem;
            padding: .5rem;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            display: inline-block;
            border-radius: .3rem;
        }

        .txt {
            background: #fff;
            border: .1rem solid #aaa;
            color: #000;
        }

        .note {
            margin: 0;
            padding: 0.5rem;
            padding-top: 2.4rem;
            padding-bottom: env(safe-area-inset-bottom);
            width: 100%;
            min-height: calc(100vh - 2.4rem);
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            overflow-y: auto;
            will-change: transform;
        }

        .note:empty:before {
            white-space: pre;
            content: "- type here or paste image\A- autosave into localStorage\A- download html/textContent/innerText\A- swap between 2 versions";
            display: block;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div class="header">
        <button onclick="download()">.html</button>
        <button onclick="download(1)">.txt</button>
        <button onclick="download(1, 1)">.t𝕖xt</button>
        <button onclick="swap(this)">swap</button>
        <button class="txt">v1</button>
    </div>
    <div class="note" autofocus contenteditable></div>
    <script>
        const [note, head, sp] = ['.note', '.header', 'span'].map(i => document.querySelector(i));
        let sto;
        window.addEventListener('load', () => (load(), note.focus()));
        note.addEventListener('scroll', scroll);
        document.addEventListener('visibilitychange', devisibled);
        window.addEventListener('beforeunload', sav);
        note.addEventListener('input', autosave);

        function download(plain = false, textContent = false) {
            const a = document.createElement('a'),
                [dat, ext, typ] = plain ? textContent ?
                    [note.textContent, 'full.txt', 'plain'] :
                    [note.innerText, 'txt', 'plain'] :
                    [note.innerHTML, 'html', 'html'],
                blb = new Blob([dat], { type: `text/${typ};charset=utf8` }),
                url = URL.createObjectURL(blb),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15),
                nam = `note.${now}.${ext}`;
            a.href = url;
            a.download = nam;
            a.click();
            URL.revokeObjectURL(url);
            sp.textContent = nam;
        }
        function sav() {
            debr();
            localStorage.setItem('html', note.innerHTML);
            sp.textContent = note.innerHTML.length;
        }
        function autosave() {
            clearTimeout(sto);
            sto = setTimeout(() => sav, 1000);
        }
        function swap(el) {
            let t = localStorage.getItem('mem') || '';
            debr();
            localStorage.setItem('mem', note.innerHTML);
            el.textContent = note.innerHTML.length;
            note.innerHTML = t;
            sp.textContent = t.length;
        }
        function load() { sp.textContent = (note.innerHTML = localStorage.getItem('html')).length; }
        function debr() { if (note.innerHTML === '<br>') note.innerHTML = ''; }
        function devisibled() { document.visibilityState === 'hidden' && sav(); }
        function scroll() { head.classList.toggle('scrolled', note.scrollTop > 0); }
    </script>
</body>

</html>
