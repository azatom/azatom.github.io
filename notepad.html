<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
        }

        .header {
            height: 2.4rem;
            position: sticky;
            top: 0;
            background: #fff;
            padding: 0;
            z-index: 1;
            display: flex;
            justify-content: space-around;
        }

        button {
            flex: 1;
            margin: .2rem;
            padding: .5rem;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            display: inline-block;
            border-radius: .3rem;
        }

        #note {
            width: 100%;
            height: calc(100vh - 2.4rem);
            margin: 0;
            padding: 0;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
        }
    </style>
</head>

<body>
    <div class="header">
        <button onclick="download()">.html</button>
        <button onclick="download(true)">.txt</button>
        <button onclick="download(true, true)">.text</button>
    </div>
    <div id="note" autofocus contenteditable="true"></div>
    <script>
        const note = document.getElementById('note');
        note.focus();
        function download(plain = false, all = false) {
            const blob = plain ?
                new Blob([all ? note.textContent : note.innerText], { type: 'text/plain;charset=utf8' }) :
                new Blob([note.innerHTML], { type: 'text/html;charset=utf8' }),
                url = URL.createObjectURL(blob),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15),
                ext = plain ? all ? 'full.txt' : 'txt' : 'html',
                a = document.createElement('a');
            a.href = url;
            a.download = `note.${now}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
