<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notapad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
        }

        .header {
            height: 2.7rem;
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            padding: 0;
            z-index: 8;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            transition: box-shadow 0.2s;
            user-select: none;
        }

        .scrolled {
            box-shadow: #567 .3rem .3rem .3rem;
        }

        button,
        select {
            flex: 1 1 5%;
            margin: .2rem;
            padding: 0;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: .3rem;
            overflow-x: hidden;
        }

        .sq {
            flex: 0 0 auto;
            width: 2.3rem;
            height: 2.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        option {
            font-size: 2rem;
        }

        /*.log {
            background: #fff;
            border: .1rem solid #aaa;
            color: #000;
        }*/

        .hl {
            background: #bcd;
        }

        .note {
            margin: 0;
            padding: 0;
            margin-top: 2.7rem;
            margin-bottom: env(safe-area-inset-bottom);
            width: 100%;
            height: calc(100vh - 2.7rem);
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            overflow-y: auto;
            will-change: transform;
            cursor: text;
        }

        .note:empty:before {
            white-space: pre;
            content: "- type here or paste image\A- autosave\A- download formats: html visible hiddenToo\A- swap: between sheets\A v.4";
            display: block;
            color: #aba;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <select onchange="dow(this)">
            <option value="" disabled selected class="hidden">Download</option>
            <option value="html">.html</option>
            <option value="txt">.txt (newlines)</option>
            <option value="text">.t𝕖xt (hiddens)</option>
        </select>
        <button onclick="confirm('clear it?') && (note.textContent = '', sav())" class="log"></button>
        <button onclick="swp()" class="swap sq">s</button>
        <button onclick="note.style.fontSize = parseFloat(window.getComputedStyle(note).fontSize) * 1.41 + 'px'" class="sq">A+</button>
        <button onclick="note.style['fontFamily']='monospace'" class="sq">m</button>
        <button onclick="note.style['whiteSpace']='pre'" class="sq">p</button>
    </div>
    <div class="note" contenteditable></div>
    <script>
        const [note, header, b2, b1] = ['.note', '.header', '.log', '.swap'].map(i => document.querySelector(i)),
            dow = e => {
                const a = document.createElement('a'),
                    [dat, ext, typ] = e.value === 'html' ?
                        [note.innerHTML, 'html', 'html'] : e.value === 'text' ?
                            [note.textContent, 'full.txt', 'plain'] :
                            [note.innerText, 'txt', 'plain'],
                    blb = new Blob([dat], { type: `text/${typ};charset=utf8` }),
                    url = URL.createObjectURL(blb),
                    now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15);
                a.href = url;
                a.download = `note.${now}.${ext}`;
                a.click();
                URL.revokeObjectURL(url);
                e.value = '';
            },
            len = s => new Intl.NumberFormat().format(s.length),
            sav = () => {
                if (note.innerHTML === '<br>') note.innerHTML = '';
                try { localStorage.setItem('sht0', note.innerHTML); } catch (e) { alert(e); }
                b2.textContent = len(note.innerHTML) + ' - ' + len(note.textContent) + ' - ' + len(note.innerText);
                b2.classList.add('hl'); clearTimeout(b2.t); b2.t = setTimeout(() => b2.classList.remove('hl'), 400);
            },
            swp = () => {
                let t = localStorage.getItem('sht1');
                localStorage.setItem('sht1', localStorage.getItem('sht0') || '');
                localStorage.setItem('sht0', t || '');
                lod();
            },
            lod = () => {
                note.innerHTML = localStorage.getItem('sht0') || '';
                let l = note.innerText.split(/\r\n|\r|\n/).length,
                    o = note.innerText.length - note.textContent.length - l;
                b2.textContent = len(note.innerHTML) + ' ' + len(note.textContent) + '+' + l + (o < 0 ? '' : '+') + o;
                b1.textContent = (s => s ? (s => ~~s == s ? s : ~~s + '+')(Math.log2(s.length)) : -1)(localStorage.getItem('sht1'));
                note.focus();
            };
        window.addEventListener('load', lod);
        window.addEventListener('beforeunload', sav);
        document.addEventListener('visibilitychange', () => document.visibilityState === 'hidden' && sav());
        note.addEventListener('scroll', () => header.classList.toggle('scrolled', note.scrollTop > 0));
        note.addEventListener('input', () => (clearTimeout(note.t), note.t = setTimeout(sav, 1000)));
    </script>
</body>

</html>
