<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>No↓epad</title>
    <style>
        body {
            --s: 2.3rem;
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
            /*padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);*/
        }

        .header {
            height: calc(var(--s) + .4rem);
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            padding: 0;
            z-index: 8;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            transition: box-shadow .2s;
            user-select: none;
        }

        button, select, .sq {
            flex: 1 1 5%;
            margin: .2rem;
            padding: 0;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: .3rem;
            overflow: hidden;
            max-height: var(--s);
        }

        .sq {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .note {
            margin: 0;
            padding: .2rem;
            margin-top: calc(var(--s) + .4rem);
            margin-bottom: env(safe-area-inset-bottom);
            width: 100%;
            height: calc(100vh - var(--s) - .4rem);
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            overflow-y: auto;
            will-change: transform;
            cursor: text;
        }

        .note:empty:before {
            white-space: pre;
            content: "- type or paste image \A- autosave\A- download formats: html, visible, hiddenToo\A- swap: between sheets\A v.3";
            display: block;
            color: #aba;
        }

        .dropdown {
            position: absolute;
            top: var(--s);
            right: .5rem;
            display: none;
            grid-template-columns: repeat(2, calc(var(--s) + .4rem));
            gap: .2rem;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: .3rem;
            z-index: 10;
            padding: .2rem;
        }

        .dropdown button {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: .3rem;
        }

        .dropdown2 {
            left: .5rem;
            right: initial;
            grid-template-columns: none;
            display: none;
            flex-direction: column;
            align-items: stretch;
            min-width: max-content;
        }
        .dropdown2 button {
            height: var(--s);
            flex-basis: auto;
            text-align: left;
            padding: 0 .5rem;
            white-space: nowrap;
            justify-content: flex-start;
        }

        .sq {
            width: var(--s);
            height: var(--s);
        }

        sub {
            font-size: .6rem;
            margin-top: .8rem;
        }

        .scrolled { box-shadow: #567 0 .1rem .3rem 0; }
        .hl { background: #d96; }
        .hidden { display: none; }
        .dropdown.show { display: grid; }
        .dropdown2.show { display: flex; }
    </style>
</head>

<body>
    <div class="header">
        <div class="sq" onclick="drpT(event, dd, df)">⇩</div>
        <div class="dropdown dropdown2" id="dd">
            <button onclick="dow('html')">.html</button>
            <button onclick="dow('txt')">.txt (newlines)</button>
            <button onclick="dow('text')">.t𝕖xt (hiddens)</button>
        </div>
        <button onclick="confirm('clear it?') && (note.textContent = '', sav())" id="log"></button>
        <button onclick="swp()" class="sq" id="swap">s</button>
        <div class="sq" onclick="drpT(event, df, dd)">𝔉</div>
        <div class="dropdown" id="df">
            <button class="sq" onclick="incF(-1)">a-</button>
            <button class="sq" onclick="incF(1)">A+</button>
            <button class="sq" onclick="togS('fontFamily', 'monospace')">𝚖</button>
            <button class="sq" onclick="togS('whiteSpace', 'pre')">w</button>
        </div>
    </div>
    <div class="note" contenteditable></div>
    <script>
        const [note, header, b2, b1, df, dd] = ['.note', '.header', '#log', '#swap', '#df', '#dd'].map(i => document.querySelector(i)),
        dow = e => {
            const a = document.createElement('a'),
                [dat, ext, typ] = e === 'html' ?
                    [note.innerHTML, 'html', 'html'] : e === 'text' ?
                    [note.textContent, 'full.txt', 'plain'] :
                    [note.innerText, 'txt', 'plain'],
                blb = new Blob([dat], { type: `text/${typ};charset=utf8` }),
                url = URL.createObjectURL(blb),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15);
            a.href = url;
            b2.textContent = a.download = `note.${now}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
            dd.classList.remove('show');
        },
        tsl = s => new Intl.NumberFormat().format(s.length),
        sb1 = () => b1.innerHTML = '<sub>2</sub>' + (s => s ? (s => ~~s == s ? s : ~~s + '+')(Math.log2(s.length)) : -1)(localStorage.getItem('sht1')),
        sb2 = (l = note.innerText.split(/\r\n|\r|\n/).length, o = note.innerText.length - note.textContent.length - l) => 
            b2.textContent = tsl(note.innerHTML) + ' ' + tsl(note.textContent) + ' +' + l + (o < 0 ? ' ' : ' +') + o,
        sav = () => {
            if (note.innerHTML === '<br>') note.innerHTML = '';
            b2.classList.add('hl');
            clearTimeout(b2.t);
            try {
                localStorage.setItem('sht0', note.innerHTML);
                b2.t = setTimeout(() => b2.classList.remove('hl'), 400);
            } catch (e) { alert(e); }
            sb2();
        },
        swp = () => {
            let t1 = localStorage.getItem('sht1') || '', t0 = note.innerHTML;
            localStorage.setItem('sht0', '');
            localStorage.setItem('sht1', '');
            try {
                localStorage.setItem('sht1', t0);
                note.innerHTML = t1;
                sb1();
            } catch (e) {
                localStorage.setItem('sht1', t1);
                alert(e);
            }
            sav();
        },
        lod = () => {
            note.innerHTML = localStorage.getItem('sht0') || '';
            sb2();
            sb1();
            note.focus();
        },
        drpT = (e, d, o) => {
            e.stopPropagation();
            d.classList.toggle('show');
            o.classList.remove('show');
        },
        togS = (k, v, s = note.style) => s[k] = s[k] === v ? '' : v,
        incF = f => note.style.fontSize = parseFloat(window.getComputedStyle(note).fontSize) * (f > 0 ? 1.4 : 5 / 7) + 'px';

        window.addEventListener('load', lod);
        window.addEventListener('beforeunload', sav);
        document.addEventListener('visibilitychange', () => document.visibilityState === 'hidden' && sav());
        document.addEventListener('click', e => [df, dd].forEach(f => f.contains(e.target) || f.classList.remove('show')));
        note.addEventListener('scroll', () => header.classList.toggle('scrolled', note.scrollTop > 0));
        note.addEventListener('input', () => (clearTimeout(note.t), note.t = setTimeout(sav, 1000)));
    </script>
</body>

</html>
