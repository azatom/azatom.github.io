<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notapad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
        }

        .header {
            height: 2.4rem;
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            padding: 0;
            z-index: 8;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            box-shadow: 0 0 0 transparent;
            transition: box-shadow 0.3s;
        }

        .header.scrolled {
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        button {
            flex: 1 1 18%;
            margin: .2rem;
            padding: .5rem;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            display: inline-block;
            border-radius: .3rem;
        }

        .note {
            margin: 0;
            padding: 0.5rem;
            padding-top: 2.4rem;
            padding-bottom: env(safe-area-inset-bottom);
            width: 100%;
            min-height: calc(100vh - 2.4rem);
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            overflow-y: auto;
            will-change: transform;
        }

        .mess {
            position: absolute;
            z-index: 9;
            top: .5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1f4;
            color: #000;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <button onclick="download()">.html</button>
        <button onclick="download(1)">.txt</button>
        <button onclick="download(1, 1)">.t𝕖xt</button>
        <button onclick="swap(this)">swap</button>
        <span>v2</span>
    </div>
    <div class="note" autofocus contenteditable></div>
    <button class="mess button hidden"></button>
    <script>
        const [note, mess, head, sp] = ['.note', '.mess', '.header', 'span'].map(i => document.querySelector(i));
        let sto;
        window.addEventListener('load', () => (load(), note.focus()));
        note.addEventListener('scroll', () => head.classList.toggle('scrolled', note.scrollTop > 0));
        document.addEventListener('visibilitychange', () => document.visibilityState === 'hidden' && sav());
        window.addEventListener('beforeunload', sav);
        note.addEventListener('input', autosave);
        function download(plain = false, textContent = false) {
            const a = document.createElement('a'),
                [dat, ext, typ] = plain ? textContent ?
                    [note.textContent, 'full.txt', 'plain'] :
                    [note.innerText, 'txt', 'plain'] :
                    [note.innerHTML, 'html', 'html'],
                blb = new Blob([dat], { type: `text/${typ};charset=utf8` }),
                url = URL.createObjectURL(blb),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15),
                nam = `note.${now}.${ext}`;
            a.href = url;
            a.download = nam;
            a.click();
            URL.revokeObjectURL(url);
            notify(`downloading ${nam}`);
        }
        function notify(s) {
            mess.textContent = s;
            mess.classList.remove('hidden');
            setTimeout(() => mess.classList.add('hidden'), 2e3);
        }
        function sav() {
            localStorage.setItem('html', note.innerHTML);
            sp.textContent = note.innerHTML.length;
        }
        function load() {
            try {
                const h = localStorage.getItem('html');
                if (!h) throw "can't: " + h;
                note.innerHTML = h;
                notify(`loaded ${h.length}`);
            } catch (e) { notify(e); }
        }
        function autosave() {
            clearTimeout(sto);
            sto = setTimeout(() => {
                sav();
                notify('Autosaved');
            }, 1000);
        }
        function swap(e) {
            try {
                let t = localStorage.getItem('mem') || '';
                localStorage.setItem('mem', note.innerHTML);
                note.innerHTML = t;
                e.textContent = mem.length;
            } catch (e) { notify(e); this.textContent = 'err'; }
        }
    </script>
</body>

</html>
