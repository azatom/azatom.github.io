<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notapad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
        }

        .header {
            height: 2.4rem;
            position: sticky;
            top: 0;
            background: #fff;
            padding: 0;
            z-index: 1;
            display: flex;
            justify-content: space-around;
        }

        em {
            color: #8cf;
        }

        .header>button {
            flex: 1;
        }

        button {
            margin: .2rem;
            padding: .5rem;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            display: inline-block;
            border-radius: .3rem;
        }

        .note {
            width: 100%;
            height: calc(100vh - 2.4rem);
            margin: 0;
            padding: 0;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            overflow: scroll;
        }

        .mess {
            position: absolute;
            z-index: 999;
            top: .5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1f4;
            color: #000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="header">
        <button onclick="download()">.html</button>
        <button onclick="download(1)">.txt</button>
        <button onclick="download(1, 1)">.t<em>e</em>xt</button>
        <button onclick="save()">save</button>
        <button onclick="load()">load</button>
        <button onclick="[note.innerHTML,mem]=[mem,note.innerHTML]">clsw</button>
    </div>
    <div class="note" autofocus contenteditable></div>
    <button class="mess button"></button>
    <script>
        const [note, mess] = ['.note', '.mess'].map(i => document.querySelector(i));
        let mem = '';
        window.addEventListener('load', () => (note.focus(), load()));
        function download(plain = false, textContent = false) {
            const
                dat = plain ? textContent ? note.textContent : note.innerText : note.innerHTML,
                ext = plain ? textContent ? 'full.txt' : 'txt' : 'html',
                typ = plain ? 'plain' : 'html',
                blb = new Blob([dat], { type: `text/${typ};charset=utf8` }),
                url = URL.createObjectURL(blb),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15),
                nam = `note.${now}.${ext}`,
                a = document.createElement('a');
            a.href = url;
            a.download = nam;
            a.click();
            URL.revokeObjectURL(url);
            notify(`downloading ${nam}`);
        }
        function notify(s, error) {
            mess.textContent = s;
            mess.classList.add('visible');
            setTimeout(() => mess.classList.remove('visible'), 1500);
        }
        function save() {
            try {
                localStorage.setItem('html', note.innerHTML), notify('saved');
            } catch (e) { notify(e); }
        }
        function load() {
            const h = localStorage.getItem('html');
            if (h) note.innerHTML = h; else notify("can't");
        }
    </script>
</body>

</html>
