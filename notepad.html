<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notapad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
        }

        .header {
            height: 2.4rem;
            position: sticky;
            top: 0;
            background: #fff;
            padding: 0;
            z-index: 1;
            display: flex;
            justify-content: space-around;
        }

        b {
            color: #8cf;
        }

        .header>button {
            flex: 1;
        }

        button {
            margin: .2rem;
            padding: .5rem;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            display: inline-block;
            border-radius: .3rem;
        }

        #note {
            width: 100%;
            height: calc(100vh - 2.4rem);
            margin: 0;
            padding: 0;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
        }

        .status {
            position: absolute;
            z-index: 999;
            top: .5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1f4;
            color: #000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error {
            background: #f25;
        }

        .status.visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="header">
        <button onclick="download()">.html</button>
        <button onclick="download(true)">.txt</button>
        <button onclick="download(true, true)">.t<b>e</b>xt</button>
        <button onclick="save()" aria-label="Save to local storage">save</button>
        <button onclick="load()" aria-label="Load from local storage">load</button>
    </div>
    <div id="note" autofocus contenteditable="true"></div>
    <button id="status" class="status button"></button>
    <script>
        const note = document.getElementById('note');
        const status = document.getElementById('status');
        window.addEventListener('load', () => { note.focus(); load(); });
        function download(plain = false, textContent = false) {
            const blob = plain ?
                new Blob([textContent ? note.textContent : note.innerText], { type: 'text/plain;charset=utf8' }) :
                new Blob([note.innerHTML], { type: 'text/html;charset=utf8' }),
                url = URL.createObjectURL(blob),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15),
                ext = plain ? textContent ? 'full.txt' : 'txt' : 'html',
                a = document.createElement('a');
            a.href = url;
            a.download = `note.${now}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
        }
        function notify(s, error) {
            status.textContent = s;
            status.classList.add('visible');
            error && status.classList.add('error');
            setTimeout(() => {
                status.classList.remove('visible', 'error');
            }, 1500);
        }
        function save() {
            try {
                localStorage.setItem('html', note.innerHTML);
                notify('saved');
            }
            catch (e) { notify(e, true); }
        }
        function load() {
            const html = localStorage.getItem('html');
            if (html) note.innerHTML = html;
        }
    </script>
</body>

</html>
