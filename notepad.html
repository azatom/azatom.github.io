<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notapad</title>
    <style>
        body {
            --s: 2.3rem;
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
            /*padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);*/
        }

        .header {
            height: calc(var(--s) + .4rem);
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            padding: 0;
            z-index: 8;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            transition: box-shadow 0.2s;
            user-select: none;
        }

        button, select, .sq {
            flex: 1 1 5%;
            margin: .2rem;
            padding: 0;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: .3rem;
            overflow: hidden;
            max-height: var(--s);
        }

        .sq, .sq>option {
            flex: 0 0 auto;
            width: var(--s);
            height: var(--s);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .note {
            margin: 0;
            padding: .2rem;
            margin-top: calc(var(--s) + .4rem);
            margin-bottom: env(safe-area-inset-bottom);
            width: 100%;
            height: calc(100vh - var(--s) - .4rem);
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            overflow-y: auto;
            will-change: transform;
            cursor: text;
        }

        .note:empty:before {
            white-space: pre;
            content: "- type or paste image \A- autosave\A- download formats: html, visible, hiddenToo\A- swap: between sheets\A v.7";
            display: block;
            color: #aba;
        }

        .dropdown {
            position: absolute;
            top: var(--s);
            right: 0.5rem;
            display: none;
            grid-template-columns: repeat(2, calc(var(--s) + .4rem));
            gap: 0.2rem;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 0.3rem;
            z-index: 10;
            padding: 0.2rem;
        }

        .dropdown button {
            width: var(--s);
            height: var(--s);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 0.3rem;
        }

        sub {
            font-size: 0.6rem;
            margin-top: 0.8rem;
        }

        .scrolled { box-shadow: #567 0 0.1rem 0.3rem 0; }
        option { font-size: 2rem; }
        .sq>option { font-size: 1rem; }
        .hl { background: #d96; }
        .hidden { display: none; }
        .dropdown.show { display: grid; }
    </style>
</head>

<body>
    <div class="header">
        <select onchange="dow(this)">
            <option value="" disabled selected class="hidden">Download</option>
            <option value="html">.html</option>
            <option value="txt">.txt (newlines)</option>
            <option value="text">.t𝕖xt (hiddens)</option>
        </select>
        <button onclick="confirm('clear it?') && (note.textContent = '', sav())" class="log"></button>
        <button onclick="swp()" class="swap sq">s</button>
        <div class="sq" onclick="togD()">𝓕</div>
        <div class="dropdown">
            <button onclick="incF(-1)">a-</button>
            <button onclick="incF(1)">A+</button>
            <button onclick="togS('fontFamily', 'monospace')">𝚖</button>
            <button onclick="togS('whiteSpace', 'pre')">𝚙</button>
        </div>
    </div>
    <div class="note" contenteditable></div>
    <script>
        const [note, header, b2, b1, dd] = ['.note', '.header', '.log', '.swap', '.dropdown'].map(i => document.querySelector(i)),
        dow = e => {
            const a = document.createElement('a'),
                [dat, ext, typ] = e.value === 'html' ?
                    [note.innerHTML, 'html', 'html'] : e.value === 'text' ?
                        [note.textContent, 'full.txt', 'plain'] :
                        [note.innerText, 'txt', 'plain'],
                blb = new Blob([dat], { type: `text/${typ};charset=utf8` }),
                url = URL.createObjectURL(blb),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15);
            a.href = url;
            a.download = `note.${now}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
            e.value = '';
        },
        len = s => new Intl.NumberFormat().format(s.length),
        sb1 = () => {
            b1.innerHTML = '<sub>2</sub>' + (s => s ? (s => ~~s == s ? s : ~~s + '+')(Math.log2(s.length)) : -1)(localStorage.getItem('sht1'));
        },
        sb2 = () => {
            let l = note.innerText.split(/\r\n|\r|\n/).length,
            o = note.innerText.length - note.textContent.length - l;
            b2.textContent = len(note.innerHTML) + ' ' + len(note.textContent) + '+' + l + (o < 0 ? '' : '+') + o;
        },
        sav = () => {
            if (note.innerHTML === '<br>') note.innerHTML = '';
            b2.classList.add('hl'); clearTimeout(b2.t);
            try {
                localStorage.setItem('sht0', note.innerHTML);
                b2.t = setTimeout(() => b2.classList.remove('hl'), 400);
            } catch (e) { alert(e); }
            sb2();
        },
        swp = () => {
            let t1 = localStorage.getItem('sht1') || '', t0 = note.innerHTML;
            localStorage.setItem('sht0', '');
            localStorage.setItem('sht1', '');
            try {
                localStorage.setItem('sht1', t0);
                note.innerHTML = t1;
                sb1();
            } catch (e) {
                localStorage.setItem('sht1', t1);
                alert(e);
            }
            sav();
        },
        lod = () => {
            note.innerHTML = localStorage.getItem('sht0') || '';
            sb2();
            sb1();
            note.focus();
        },
        togS = (k, v, s = note.style) => s[k] = s[k] === v ? '' : v,
        togD = () => dd.classList.toggle('show'),
        incF = f => note.style.fontSize = parseFloat(window.getComputedStyle(note).fontSize) * (f > 0 ? 1.4 : 5 / 7) + 'px';
        window.addEventListener('load', lod);
        window.addEventListener('beforeunload', sav);
        document.addEventListener('visibilitychange', () => document.visibilityState === 'hidden' && sav());
        document.addEventListener('click', (e) =>
            !dd.contains(e.target) &&
            !e.target.classList.contains('sq') &&
            dd.classList.remove('show')
        );
        note.addEventListener('scroll', () => header.classList.toggle('scrolled', note.scrollTop > 0));
        note.addEventListener('input', () => (clearTimeout(note.t), note.t = setTimeout(sav, 1000)));
    </script>
</body>

</html>
