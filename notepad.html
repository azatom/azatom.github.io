<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notapad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: sans-serif;
            background-color: #bbb;
        }

        .header {
            height: 2.7rem;
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            padding: 0;
            z-index: 8;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            transition: box-shadow 0.2s;
            user-select: none;
        }

        .scrolled {
            box-shadow: #567 .3rem .3rem .3rem;
        }

        button,
        select {
            flex: 1 1 18%;
            margin: .2rem;
            padding: .5rem;
            font-size: 1rem;
            background: #08f;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: .3rem;
        }

        .sq {
            flex: 0 0 auto;
            width: 2.3rem;
            height: 2.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        option {
            font-size: 2.5rem;
        }

        .log {
            background: #fff;
            border: .1rem solid #aaa;
            color: #000;
            overflow-x: hidden;
        }

        .note {
            margin: 0;
            padding: 0;
            margin-top: 2.7rem;
            margin-bottom: env(safe-area-inset-bottom);
            width: 100%;
            height: calc(100vh - 2.7rem);
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            overflow-y: auto;
            will-change: transform;
        }

        .note:empty:before {
            white-space: pre;
            content: "- type here or paste image\A- autosave\A- download formats: html visible hiddenToo\A- swap: between sheets\A v.1";
            display: block;
            color: #aaa;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <select onchange="download(this)">
            <option value="" disabled selected class="hidden">Download</option>
            <option value="html">.html</option>
            <option value="txt">.txt (newlines)</option>
            <option value="text">.t𝕖xt (hiddens)</option>
        </select>
        <button onclick="swap()" class="swap">swap</button>
        <button onclick="clr()" class="log"></button>
        <button onclick="incFont()" class="sq">A+</button>
        <button onclick="note.style['fontFamily']='monospace'" class="sq">m</button>
        <button onclick="note.style['whiteSpace']='pre'" class="sq">p</button>
    </div>
    <div class="note" contenteditable></div>
    <script>
        const st = {}, [note, header, log, sp] = ['.note', '.header', '.header>.log', '.swap'].map(i => document.querySelector(i));

        window.addEventListener('load', load);
        window.addEventListener('beforeunload', sav);
        document.addEventListener('visibilitychange', devisibled);
        note.addEventListener('scroll', scroll);
        note.addEventListener('input', autosave);

        function download(e) {
            const fmt = e.value;
            const a = document.createElement('a'),
                [dat, ext, typ] = fmt === 'html' ?
                    [note.innerHTML, 'html', 'html'] : fmt === 'text' ?
                        [note.textContent, 'full.txt', 'plain'] :
                        [note.innerText, 'txt', 'plain'],
                blb = new Blob([dat], { type: `text/${typ};charset=utf8` }),
                url = URL.createObjectURL(blb),
                now = new Date().toISOString().replace(/[-:.]/g, '').replace('T', '.').slice(0, 15);
            a.href = url;
            a.download = `note.${now}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
            e.value = '';
        }
        function sav() {
            debr();
            try { localStorage.setItem('html', note.innerHTML); } catch (e) { alert(e); }
            log.textContent = note.innerHTML.length;
        }
        function autosave() {
            clearTimeout(st.t);
            st.t = setTimeout(sav, 1000);
        }
        function swap() {
            let t = localStorage.getItem('mem') || '';
            debr();
            localStorage.setItem('mem', note.innerHTML);
            sp.textContent = note.innerHTML.length;
            note.innerHTML = t;
            log.textContent = t.length;
        }
        function load() {
            localStorage.getItem('html') && (log.textContent = (note.innerHTML = localStorage.getItem('html')).length);
            localStorage.getItem('mem') && (sp.textContent = localStorage.getItem('mem').length);
            note.focus();
        }
        function clr() { confirm('clear it?') && (note.textContent = '', sav()); }
        function debr() { if (note.innerHTML === '<br>') note.innerHTML = ''; }
        function devisibled() { document.visibilityState === 'hidden' && sav(); }
        function scroll(e) { header.classList.toggle('scrolled', note.scrollTop > 0); }
        function incFont() { note.style.fontSize = parseFloat(window.getComputedStyle(note).fontSize) * 1.1 + 'px'; }
    </script>
</body>

</html>
