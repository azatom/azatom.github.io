<!doctype html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark" />
    <title>level</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            margin: 30px;
            touch-action: manipulation;
            user-select: none;
        }

        .value {
            display: inline;
            font-size: 2.5em;
            margin: 10px;
        }

        button {
            font-size: 18px;
            padding: 8px 18px;
            margin: 10px;
        }

        table {
            margin: 25px auto;
            border-collapse: collapse;
            user-select: text;
        }

        th,
        td {
            border: 1px solid #888;
            padding: 6px 12px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div>Pitch:<div class="value"><span id="pitch"></span>°</div></div>
    <div>Roll:<div class="value"><span id="roll"></span>°</div></div>
    <button id="capture">Capture</button>
    <table id="tbl">
        <thead>
            <tr>
                <th>P</th>
                <th>R</th>
                <th>avgP</th>
                <th>avgR</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
        let pitch = 0, roll = 0;
        const rows = [];
        function normalize(a) {
            while (a > 180) a -= 360;
            while (a < -180) a += 360;
            return a;
        }
        function update(e) {
            pitch = normalize(e.beta);
            roll = normalize(e.gamma);
            document.getElementById("pitch").textContent = pitch.toFixed(1);
            document.getElementById("roll").textContent = roll.toFixed(1);
        }
        async function start() {
            if (typeof DeviceOrientationEvent !== "undefined" &&
                typeof DeviceOrientationEvent.requestPermission === "function") {
                try {
                    const p = await DeviceOrientationEvent.requestPermission();
                    if (p !== "granted") return;
                } catch (e) { }
            }
            window.addEventListener("deviceorientation", update, true);
        }
        start();
        document.getElementById("capture").onclick = () => {
            rows.push({ pitch, roll });
            const tbody = document.querySelector("#tbl tbody");
            const tr = document.createElement("tr");
            let avg = { p: '', r: '' };
            if (rows.length >= 2) {
                const a = rows[rows.length - 2];
                const b = rows[rows.length - 1];
                avg = {
                    p: ((a.pitch + b.pitch) / 2).toFixed(2),
                    r: ((a.roll + b.roll) / 2).toFixed(2),
                };
            }
            tr.innerHTML = `
        <td>${pitch.toFixed(2)}</td>
        <td>${roll.toFixed(2)}</td>
        <td>${avg.p}</td>
        <td>${avg.r}</td>
    `;
            tbody.prepend(tr);
            while (tbody.rows.length > 20)
                tbody.deleteRow(tbody.rows.length - 1);
        };
    </script>
</body>

</html>
