<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>keycode</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<meta name="color-scheme" content="light dark" />
<style>
  body {
    font-family: monospace, monospace;
    overflow-y: hidden;
  }
  table {border-collapse: collapse;}
  td {
    border: .06rem solid #aaa7;
    padding: .1rem .2rem;
  }
  th {
    position: relative;
    height: 2.8rem;
    padding: .1rem .2rem;
    min-width: 1rem;
  }
  th>div {
    position: absolute;
    bottom: 0;
    left: .8rem;
    transform: rotate(-35deg);
    transform-origin: left bottom;
    text-align: left;
    font-size: .8rem;
  }
</style>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const cols = ['type', 'code', 'key', 'keyCode', 'button', 'buttons', 'altKey', 'shiftKey', 'ctrlKey', 'metaKey', 'dtime', '#'];
  const eTypesSkipped = ['mousemove',];
  const eTypes = [
    'keydown', 'keyup', 'keypress',
    'mousedown', 'mouseup', 'click', 'dblclick', 'contextmenu',
    'pointerdown', 'pointerup', 'pointercancel',
    'input', 'change', 'beforeinput',
    'focus', 'blur', 'focusin', 'focusout',
    'compositionstart', 'compositionupdate', 'compositionend',
    'scroll', 'wheel',
    'dragstart', 'drag', 'dragenter', 'dragover', 'dragleave', 'drop', 'dragend',
    'resize',
  ];
  document.body.innerHTML = `
    <label><input onchange="!this.checked&&this.blur()" style="zoom:1.8" type="checkbox" /><b><u>P</u></b>ause</label>
    <table>
      <thead>${cols.map(k => `<th><div>${k.replace(/Key$/, '')}</div></th>`).join('')}</thead>
      <tbody></tbody>
    </table>
  `;
  const pause = document.querySelector('input');
  const tbody = document.querySelector('tbody');
  const trs = [];
  let cnt = 0;
  let t0 = performance.now();
  const td = (ev, col, t1) =>
    col === "dtime" ? ([col, t0] = [t0, t1], (t1 - col).toFixed(3)) :
    col === "#" ? cnt++ :
    col.endsWith("Key" ) ? ev[col] ? col[0] : "" :
    ev[col] !== undefined ? ev[col] :
    '';
  const log = (ev) => {
    const t1 = performance.now();
    if (ev.type === 'keydown' && ev.code === 'KeyP' && !(ev.altKey || ev.ctrlKey || ev.metaKey || ev.shiftKey)) {
      pause.checked = !pause.checked;
      ev.preventDefault();
      ev.stopPropagation();
      return;
    }
    if (pause.checked || ev.target === pause || ev.target === pause.parentElement) return;
    ev.preventDefault();
    ev.stopPropagation();
    const row = 999 < trs.length ? trs.pop() : document.createElement('tr');
    row.innerHTML = cols.map(col => `<td>${td(ev, col, t1)}</td>`).join('');
    trs.unshift(row);
    tbody.prepend(row);
  };
  eTypes.forEach(eType => window.addEventListener(eType, log, {capture:true}));
});
</script>
</head>
<body>
</body>
</html>
